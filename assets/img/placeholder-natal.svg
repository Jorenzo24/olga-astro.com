<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Natal chart placeholder">
  <defs>
    <radialGradient id="pg" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#1b2c63"/>
      <stop offset="1" stop-color="#0a112e"/>
    </radialGradient>
    <linearGradient id="pgold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6c97f"/>
      <stop offset="1" stop-color="#c9a24b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#pg)"/>
  <!-- stars -->
  <g fill="#fff" opacity=".7">
    <circle cx="60" cy="70" r="1.5"/><circle cx="330" cy="60" r="1.2"/><circle cx="350" cy="300" r="1.5"/>
    <circle cx="40" cy="320" r="1.2"/><circle cx="120" cy="40" r="1"/><circle cx="300" cy="350" r="1"/>
  </g>
  <g fill="none" stroke="url(#pgold)" stroke-width="1.5" transform="translate(200 200)">
    <circle r="150" opacity=".9"/>
    <circle r="120" opacity=".5"/>
    <circle r="78" opacity=".7"/>
    <!-- 12 house spokes -->
    <g opacity=".55">
      <line x1="-150" y1="0" x2="150" y2="0"/>
      <line x1="0" y1="-150" x2="0" y2="150"/>
      <line x1="-130" y1="-75" x2="130" y2="75"/>
      <line x1="-130" y1="75" x2="130" y2="-75"/>
      <line x1="-75" y1="-130" x2="75" y2="130"/>
      <line x1="-75" y1="130" x2="75" y2="-130"/>
    </g>
    <!-- aspect lines -->
    <g stroke="#e6c97f" opacity=".8">
      <path d="M-60 -45 L70 20 L-10 75 Z"/>
      <path d="M40 -65 L-72 10" />
    </g>
    <!-- planet dots -->
    <g fill="#e6c97f" stroke="none">
      <circle cx="-60" cy="-45" r="4"/><circle cx="70" cy="20" r="4"/><circle cx="-10" cy="75" r="4"/>
      <circle cx="40" cy="-65" r="3.5"/><circle cx="-72" cy="10" r="3.5"/>
    </g>
    <circle r="5" fill="#fff" stroke="none"/>
  </g>
  <text x="200" y="388" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" letter-spacing="2" fill="#e6c97f" opacity=".75">IMAGE PLACEHOLDER</text>
</svg>
